# Public data source definitions
# All sources accessed via the sdmx1 library (sdmx.Client)
#
# Eurostat source: ESTAT (sdmx1 source ID)
#   Key format: dimension1.dimension2...dimensionN (dots in URL path)
#
# GEO CODES — Euro Area changing composition:
#   EA = changing composition (preferred, keeps consistency as EA expanded)
#   EA19 = fixed composition, original 19 members (used when EA unavailable)
#   EA20 = EA19 + Croatia (joined Jan 2023)
#   EA21 = latest composition
#
# Availability by dataset:
#   namq_10_gdp (GDP):       EA ✅ (changing composition)
#   sts_inpr_m (IP):         EA19 (EA not published by Eurostat)
#   prc_hicp_midx (HICP):    EA ✅ (changing composition)
#   sts_inpp_m (PPI):        EA19 (EA not published by Eurostat)
#   une_rt_m (Unemployment): EA19 (only EA21 available with SA; EA19 for historical consistency)
#   EI_BSSI_M_R2 (Surveys):  EA20 (EA not published by Eurostat)
#
# ECB source: ECB (sdmx1 source ID)
#   U2 = Euro Area changing composition (all ECB series use this)
#   Dataflows: BSI (monetary), FM (financial markets), EXR (exchange rates)

sources:

  eurostat:
    base_url: "https://ec.europa.eu/eurostat/api/dissemination"
    series:
      # === National Accounts (GDP) ===
      # namq_10_gdp: freq.unit.s_adj.na_item.geo
      - id: "GDP_LEVELS"
        code: "namq_10_gdp"
        filter: "Q.CLV10_MEUR.SCA.B1GQ.EA"
        frequency: "quarterly"
        description: "GDP at market prices, chain-linked volumes, SA (EA changing composition)"
        publication_lag_days: 30
        revised: true

      # === Industrial Production ===
      # sts_inpr_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      # NOTE: Eurostat SDMX only provides EA19 for this dataset (no EA changing composition)
      - id: "IP_TOTAL"
        code: "sts_inpr_m"
        filter: "M.PRD.B-D.SCA.I21.EA19"
        frequency: "monthly"
        description: "Industrial production, manufacturing, SA, index 2021 (EA19 — EA not available in Eurostat)"
        publication_lag_days: 45
        revised: true

      # === Prices ===
      # prc_hicp_midx: freq.unit.coicop.geo
      - id: "HICP_TOTAL"
        code: "prc_hicp_midx"
        filter: "M.I15.CP00.EA"
        frequency: "monthly"
        description: "HICP All-items, index 2015=100 (EA changing composition)"
        publication_lag_days: 20
        revised: false

      - id: "HICP_ENERGY"
        code: "prc_hicp_midx"
        filter: "M.I15.NRG.EA"
        frequency: "monthly"
        description: "HICP Energy, index 2015=100 (EA changing composition)"
        publication_lag_days: 20
        revised: false

      # sts_inpp_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      # NOTE: Eurostat SDMX only provides EA19 for this dataset (no EA changing composition)
      - id: "PPI_DOM"
        code: "sts_inpp_m"
        filter: "M.PRC_PRR.B-D.NSA.I21.EA19"
        frequency: "monthly"
        description: "PPI manufacturing, NSA, index 2021 (EA19 — EA not available in Eurostat)"
        publication_lag_days: 45
        revised: true

      # === Labor Market ===
      # une_rt_m: freq.s_adj.age.unit.sex.geo
      # NOTE: Eurostat SDMX only provides EA21 for this dataset (no EA changing composition)
      - id: "UNEMP"
        code: "une_rt_m"
        filter: "M.SA.TOTAL.PC_ACT.T.EA21"
        frequency: "monthly"
        description: "Unemployment rate, total, SA (EA21 — EA not available in Eurostat)"
        publication_lag_days: 35
        revised: true

  # === Business and Consumer Surveys (DG-ECFIN direct download) ===
  # DG-ECFIN publishes survey data with EA (changing composition) geo code
  # via their own download portal, which is NOT available via Eurostat SDMX.
  # The ECFINLoader downloads the main_indicators_sa_nace2.zip file.
  ecfin:
    base_url: ""
    series:
      # All series use EA (changing composition) from DG-ECFIN direct download
      # ESI is a composite index centered at 100; others are net balances
      - id: "ESI"
        code: "EA.ESI"
        filter: ""
        frequency: "monthly"
        description: "Economic Sentiment Indicator (composite, SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ServicesCI"
        code: "EA.SERV"
        filter: ""
        frequency: "monthly"
        description: "Services Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ICI"
        code: "EA.INDU"
        filter: ""
        frequency: "monthly"
        description: "Manufacturing Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "CCI"
        code: "EA.CONS"
        filter: ""
        frequency: "monthly"
        description: "Consumer Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "RetailCI"
        code: "EA.RETA"
        filter: ""
        frequency: "monthly"
        description: "Retail Trade Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ConstCI"
        code: "EA.BUIL"
        filter: ""
        frequency: "monthly"
        description: "Construction Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

  ecb:
    base_url: ""
    series:
      # All ECB series use U2 = Euro Area changing composition

      # === Monetary Aggregates ===
      # BSI: freq.ref_area.adjustment.bs_rep_sector.bs_item.maturity_orig.data_type.count_area.bs_count_sector.currency_trans.bs_suffix
      - id: "M3"
        code: "BSI"
        filter: "M.U2.Y.V.M30.X.1.U2.2300.Z01.E"
        frequency: "monthly"
        description: "Monetary aggregate M3, SA, EUR millions (EA changing composition)"
        publication_lag_days: 30
        revised: false

      # === Interest Rates (Financial Markets dataflow: FM) ===
      # FM: freq.ref_area.currency.provider_fm.cb_nominal_measure.fm_item.fmat
      # 1-Month Euribor (nominal, monthly average)
      - id: "EURIBOR1M"
        code: "FM"
        filter: "M.U2.EUR.RT.MM.EURIBOR1MD_.HSTA"
        frequency: "monthly"
        description: "1-Month Euribor, monthly average"
        publication_lag_days: 5
        revised: false

      # 10-year government bond yield
      - id: "BOND_10Y"
        code: "FM"
        filter: "M.U2.EUR.4F.BB.U2_10Y.YLD"
        frequency: "monthly"
        description: "Euro area 10-year government bond yield, monthly average"
        publication_lag_days: 1
        revised: false

      # === Equity Markets ===
      # Euro Stoxx 50 index
      - id: "EUROSTOXX50"
        code: "FM"
        filter: "M.U2.EUR.DS.EI.DJEURST.HSTA"
        frequency: "monthly"
        description: "Euro Stoxx 50 index, monthly average"
        publication_lag_days: 1
        revised: false

      # === Exchange Rates ===
      # EXR: freq.currency.currency_ref.currency_provider.collection
      - id: "EURUSD"
        code: "EXR"
        filter: "M.USD.EUR.SP00.A"
        frequency: "monthly"
        description: "EUR/USD exchange rate, monthly average"
        publication_lag_days: 5
        revised: false
