# Public data source definitions
# All sources accessed via the sdmx1 library (sdmx.Client) or DG-ECFIN direct download
#
# GEO CODES — Euro Area changing composition:
#   Eurostat: EA (GDP, HICP)
#   ECB:      S0 = EA moving concept / U2 = EA changing composition (all ECB series)
#   DG-ECFIN: EA (direct download file)
#
# ECB RTD (Real-Time Database):
#   Provides vintage history via include_history=True for pseudo-real-time backtesting.
#   IP_TOTAL uses RTD with S0 (changing composition) + vintage support.

sources:

  eurostat:
    base_url: "https://ec.europa.eu/eurostat/api/dissemination"
    series:
      # === National Accounts (GDP) ===
      # GDP is NOT available in ECB RTD. Using Eurostat with EA changing composition.
      - id: "GDP_LEVELS"
        code: "namq_10_gdp"
        filter: "Q.CLV10_MEUR.SCA.B1GQ.EA"
        frequency: "quarterly"
        description: "GDP at market prices, chain-linked volumes, SA (EA changing composition)"
        publication_lag_days: 30
        revised: true

  ecb:
    base_url: ""
    series:
      # === ECB RTD series (S0 = EA changing composition + vintage history) ===
      # RTD key: freq.ref_area.adjustment.rt_econ_concept.rt_denom
      # Vintages available via include_history=True for pseudo-real-time backtesting.

      # Industrial Production (total excl construction & energy), WDA
      - id: "IP_TOTAL"
        code: "RTD"
        filter: "M.S0.W.I_XCOEN.X"
        frequency: "monthly"
        description: "Industrial production index, WDA (EA changing composition, ECB RTD with vintages)"
        publication_lag_days: 45
        revised: true

      # PPI domestic (total excl construction & energy), NSA, Index
      - id: "PPI_DOM"
        code: "RTD"
        filter: "M.S0.N.P_P_XCOEN_DS.X"
        frequency: "monthly"
        description: "Producer price index, domestic, NSA (EA changing composition, ECB RTD with vintages)"
        publication_lag_days: 45
        revised: true

      # HICP All-items, NSA, Index
      - id: "HICP_TOTAL"
        code: "RTD"
        filter: "M.S0.N.P_C_OV.X"
        frequency: "monthly"
        description: "HICP All-items index, NSA (EA changing composition, ECB RTD with vintages)"
        publication_lag_days: 20
        revised: false

      # HICP Energy, NSA, Index
      - id: "HICP_ENERGY"
        code: "RTD"
        filter: "M.S0.N.P_C_NRGY.X"
        frequency: "monthly"
        description: "HICP Energy index, NSA (EA changing composition, ECB RTD with vintages)"
        publication_lag_days: 20
        revised: false

      # Euro Stoxx 50 index
      - id: "EUROSTOXX50"
        code: "RTD"
        filter: "M.S0.N.C_DJE50.X"
        frequency: "monthly"
        description: "Euro Stoxx 50 index (EA changing composition, ECB RTD with vintages)"
        publication_lag_days: 1
        revised: false

      # === ECB SDMX series (U2 = EA changing composition, no vintage history) ===

      # Labour Market
      - id: "UNEMP"
        code: "LFSI"
        filter: "M.U2.S.UNEHRT.TOTAL0.15_74.T"
        frequency: "monthly"
        description: "Unemployment rate, total, SA (EA changing composition, 15-74)"
        publication_lag_days: 35
        revised: true

      # Monetary Aggregates
      - id: "M3"
        code: "BSI"
        filter: "M.U2.Y.V.M30.X.1.U2.2300.Z01.E"
        frequency: "monthly"
        description: "Monetary aggregate M3, SA, EUR millions (EA changing composition)"
        publication_lag_days: 30
        revised: false

      # Interest Rates
      - id: "EURIBOR1M"
        code: "FM"
        filter: "M.U2.EUR.RT.MM.EURIBOR1MD_.HSTA"
        frequency: "monthly"
        description: "1-Month Euribor, monthly average"
        publication_lag_days: 5
        revised: false

      - id: "BOND_10Y"
        code: "FM"
        filter: "M.U2.EUR.4F.BB.U2_10Y.YLD"
        frequency: "monthly"
        description: "Euro area 10-year government bond yield, monthly average"
        publication_lag_days: 1
        revised: false

      # Exchange Rates
      - id: "EURUSD"
        code: "EXR"
        filter: "M.USD.EUR.SP00.A"
        frequency: "monthly"
        description: "EUR/USD exchange rate, monthly average"
        publication_lag_days: 5
        revised: false

  # === Business and Consumer Surveys (DG-ECFIN direct download) ===
  ecfin:
    base_url: ""
    series:
      - id: "ESI"
        code: "EA.ESI"
        filter: ""
        frequency: "monthly"
        description: "Economic Sentiment Indicator (composite, SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ServicesCI"
        code: "EA.SERV"
        filter: ""
        frequency: "monthly"
        description: "Services Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ICI"
        code: "EA.INDU"
        filter: ""
        frequency: "monthly"
        description: "Manufacturing Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "CCI"
        code: "EA.CONS"
        filter: ""
        frequency: "monthly"
        description: "Consumer Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "RetailCI"
        code: "EA.RETA"
        filter: ""
        frequency: "monthly"
        description: "Retail Trade Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false

      - id: "ConstCI"
        code: "EA.BUIL"
        filter: ""
        frequency: "monthly"
        description: "Construction Confidence Indicator (SA, EA changing composition)"
        publication_lag_days: 5
        revised: false
