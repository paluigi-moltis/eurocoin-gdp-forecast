# Public data source definitions
# All sources are freely accessible via public APIs
#
# Eurostat SDMX key format: dimension1.dimension2...dimensionN (dots in URL path)
# FRED CSV API: https://fred.stlouisfed.org/graph/fredgraph.csv?id=SERIES_ID
#
# NOTE: Eurostat geo codes vary by dataset:
# - Hard data (GDP, IP, prices): EA19 or EA20
# - Survey data: EA20 only (EA19 not available for all survey datasets)
#
# NOTE: ECB SDW API (data-api.ecb.europa.eu) is not accessible from all servers.
# Financial data (bond yields, M3) is sourced via FRED (OECD mirror) instead.

sources:

  eurostat:
    base_url: "https://ec.europa.eu/eurostat/api/dissemination"
    series:
      # === National Accounts (GDP) ===
      # namq_10_gdp: freq.unit.s_adj.na_item.geo
      - id: "GDP_LEVELS"
        code: "namq_10_gdp"
        filter: "Q.CLV10_MEUR.SCA.B1GQ.EA19"
        frequency: "quarterly"
        description: "GDP at market prices, chain-linked volumes, SA (EA19)"
        publication_lag_days: 30
        revised: true

      # === Industrial Production ===
      # sts_inpr_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      - id: "IP_TOTAL"
        code: "sts_inpr_m"
        filter: "M.PRD.B-D.SCA.I21.EA19"
        frequency: "monthly"
        description: "Industrial production, manufacturing, SA, index 2021 (EA19)"
        publication_lag_days: 45
        revised: true

      # === Prices ===
      # prc_hicp_midx: freq.unit.coicop.geo
      - id: "HICP_TOTAL"
        code: "prc_hicp_midx"
        filter: "M.I15.CP00.EA19"
        frequency: "monthly"
        description: "HICP All-items, index 2015=100 (EA19)"
        publication_lag_days: 20
        revised: false

      - id: "HICP_ENERGY"
        code: "prc_hicp_midx"
        filter: "M.I15.NRG.EA19"
        frequency: "monthly"
        description: "HICP Energy, index 2015=100 (EA19)"
        publication_lag_days: 20
        revised: false

      # sts_inpp_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      - id: "PPI_DOM"
        code: "sts_inpp_m"
        filter: "M.PRC_PRR.B-D.NSA.I21.EA19"
        frequency: "monthly"
        description: "PPI manufacturing, NSA, index 2021 (EA19)"
        publication_lag_days: 45
        revised: true

      # === Labor Market ===
      # une_rt_m: freq.s_adj.age.unit.sex.geo
      - id: "UNEMP"
        code: "une_rt_m"
        filter: "M.SA.TOTAL.PC_ACT.T.EA21"
        frequency: "monthly"
        description: "Unemployment rate, total, SA (EA21)"
        publication_lag_days: 35
        revised: true

      # === Business Surveys ===
      # ei_bsin_m_r2: freq.indic.s_adj.unit.geo
      - id: "ICI"
        code: "ei_bsin_m_r2"
        filter: "M.BS-ICI.SA.BAL.EA20"
        frequency: "monthly"
        description: "Industrial Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsbu_m_r2: freq.indic.s_adj.geo
      - id: "CCI"
        code: "ei_bsbu_m_r2"
        filter: "M.BS-CCI-BAL.SA.EA20"
        frequency: "monthly"
        description: "Consumer Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsci_m_r2: freq.indic.s_adj.geo
      - id: "ConstCI"
        code: "ei_bsci_m_r2"
        filter: "M.BS-BCI.SA.EA20"
        frequency: "monthly"
        description: "Construction Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsrt_m_r2: freq.indic.s_adj.unit.geo
      - id: "RetailCI"
        code: "ei_bsrt_m_r2"
        filter: "M.BS-RCI.SA.BAL.EA20"
        frequency: "monthly"
        description: "Retail Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

  fred:
    base_url: "https://fred.stlouisfed.org/graph/fredgraph.csv"
    series:
      # OECD-sourced financial data mirrored on FRED
      - id: "BOND_10Y"
        code: "IRLTLT01EZM156N"
        filter: ""
        frequency: "monthly"
        description: "Euro area 10-year government bond yield (OECD via FRED)"
        publication_lag_days: 1
        revised: false

      - id: "M3"
        code: "MABMM301EZM189S"
        filter: ""
        frequency: "monthly"
        description: "Euro area M3 monetary aggregate (OECD via FRED, until Nov 2023)"
        publication_lag_days: 30
        revised: false
