# Public data source definitions
# All sources accessed via the sdmx1 library (sdmx.Client)
#
# Eurostat source: ESTAT (sdmx1 source ID)
#   Key format: dimension1.dimension2...dimensionN (dots in URL path)
#   Geo codes vary by dataset: EA19 (hard data), EA20/EA21 (surveys/labor)
#
# ECB source: ECB (sdmx1 source ID)
#   Dataflows: BSI (monetary), FM (financial markets), EXR (exchange rates)

sources:

  eurostat:
    base_url: "https://ec.europa.eu/eurostat/api/dissemination"
    series:
      # === National Accounts (GDP) ===
      # namq_10_gdp: freq.unit.s_adj.na_item.geo
      - id: "GDP_LEVELS"
        code: "namq_10_gdp"
        filter: "Q.CLV10_MEUR.SCA.B1GQ.EA19"
        frequency: "quarterly"
        description: "GDP at market prices, chain-linked volumes, SA (EA19)"
        publication_lag_days: 30
        revised: true

      # === Industrial Production ===
      # sts_inpr_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      - id: "IP_TOTAL"
        code: "sts_inpr_m"
        filter: "M.PRD.B-D.SCA.I21.EA19"
        frequency: "monthly"
        description: "Industrial production, manufacturing, SA, index 2021 (EA19)"
        publication_lag_days: 45
        revised: true

      # === Prices ===
      # prc_hicp_midx: freq.unit.coicop.geo
      - id: "HICP_TOTAL"
        code: "prc_hicp_midx"
        filter: "M.I15.CP00.EA19"
        frequency: "monthly"
        description: "HICP All-items, index 2015=100 (EA19)"
        publication_lag_days: 20
        revised: false

      - id: "HICP_ENERGY"
        code: "prc_hicp_midx"
        filter: "M.I15.NRG.EA19"
        frequency: "monthly"
        description: "HICP Energy, index 2015=100 (EA19)"
        publication_lag_days: 20
        revised: false

      # sts_inpp_m: freq.indic_bt.nace_r2.s_adj.unit.geo
      - id: "PPI_DOM"
        code: "sts_inpp_m"
        filter: "M.PRC_PRR.B-D.NSA.I21.EA19"
        frequency: "monthly"
        description: "PPI manufacturing, NSA, index 2021 (EA19)"
        publication_lag_days: 45
        revised: true

      # === Labor Market ===
      # une_rt_m: freq.s_adj.age.unit.sex.geo
      - id: "UNEMP"
        code: "une_rt_m"
        filter: "M.SA.TOTAL.PC_ACT.T.EA21"
        frequency: "monthly"
        description: "Unemployment rate, total, SA (EA21)"
        publication_lag_days: 35
        revised: true

      # === Business and Consumer Surveys (leading indicators) ===
      # ei_bsin_m_r2: freq.indic.s_adj.unit.geo
      - id: "ICI"
        code: "ei_bsin_m_r2"
        filter: "M.BS-ICI.SA.BAL.EA20"
        frequency: "monthly"
        description: "Industrial Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsbu_m_r2: freq.indic.s_adj.geo
      - id: "CCI"
        code: "ei_bsbu_m_r2"
        filter: "M.BS-CCI-BAL.SA.EA20"
        frequency: "monthly"
        description: "Consumer Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsci_m_r2: freq.indic.s_adj.geo
      - id: "ConstCI"
        code: "ei_bsci_m_r2"
        filter: "M.BS-BCI.SA.EA20"
        frequency: "monthly"
        description: "Construction Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

      # ei_bsrt_m_r2: freq.indic.s_adj.unit.geo
      - id: "RetailCI"
        code: "ei_bsrt_m_r2"
        filter: "M.BS-RCI.SA.BAL.EA20"
        frequency: "monthly"
        description: "Retail Trade Confidence Indicator, SA (EA20)"
        publication_lag_days: 5
        revised: false

  ecb:
    base_url: ""
    series:
      # === Monetary Aggregates ===
      # BSI: freq.ref_area.adjustment.bs_rep_sector.bs_item.maturity_orig.data_type.count_area.bs_count_sector.currency_trans.bs_suffix
      - id: "M3"
        code: "BSI"
        filter: "M.U2.Y.V.M30.X.1.U2.2300.Z01.E"
        frequency: "monthly"
        description: "Monetary aggregate M3, SA, EUR millions (EA)"
        publication_lag_days: 30
        revised: false

      # === Interest Rates (Financial Markets dataflow: FM) ===
      # FM: freq.ref_area.currency.provider_fm.cb_nominal_measure.fm_item.fmat
      # €STR (Euro Short-Term Rate) — replaces EONIA as the key short-term rate
      - id: "ESTR"
        code: "FM"
        filter: "M.U2.EUR.4F.MM.UONSTR.HSTA"
        frequency: "monthly"
        description: "Euro Short-Term Rate (€STR), monthly average"
        publication_lag_days: 5
        revised: false

      # 10-year government bond yield
      - id: "BOND_10Y"
        code: "FM"
        filter: "M.U2.EUR.4F.BB.U2_10Y.YLD"
        frequency: "monthly"
        description: "Euro area 10-year government bond yield, monthly average"
        publication_lag_days: 1
        revised: false

      # === Equity Markets ===
      # Euro Stoxx 50 index
      - id: "EUROSTOXX50"
        code: "FM"
        filter: "M.U2.EUR.DS.EI.DJEURST.HSTA"
        frequency: "monthly"
        description: "Euro Stoxx 50 index, monthly average"
        publication_lag_days: 1
        revised: false

      # === Exchange Rates ===
      # EXR: freq.currency.currency_ref.currency_provider.collection
      - id: "EURUSD"
        code: "EXR"
        filter: "M.USD.EUR.SP00.A"
        frequency: "monthly"
        description: "EUR/USD exchange rate, monthly average"
        publication_lag_days: 5
        revised: false
